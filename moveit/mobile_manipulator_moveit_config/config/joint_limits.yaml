# ============================================================================
# Joint Limits for Smooth Motion
# ============================================================================
# max_velocity: rad/s, max_acceleration: rad/s²
# 부드러운 모션을 위해 가속도를 낮춤 (2.0 → 0.75 rad/s²)
# Pilz planner를 위한 position limits 추가
# ============================================================================

joint_limits:
  link2_to_link1:
    has_position_limits: true
    min_position: -3.14159  # -180° (기존 -135°에서 확장)
    max_position: 3.14159   # 180°  (기존 135°에서 확장)
    has_velocity_limits: true
    max_velocity: 1.2  # 약 69 deg/s (기존 1.5)
    has_acceleration_limits: true
    max_acceleration: 0.75  # 약 43 deg/s² (기존 2.0)
  link3_to_link2:
    has_position_limits: true
    min_position: -3.1416  # -180°
    max_position: 1.57       # 0°
    has_velocity_limits: true
    max_velocity: 1.0     #기존 1.2 (대현)
    has_acceleration_limits: true
    max_acceleration: 0.5   #기존 0.75(대현)
  link4_to_link3:
    has_position_limits: true
    min_position: -3.1416 
    max_position: 0.0
    has_velocity_limits: true
    max_velocity: 1.2
    has_acceleration_limits: true
    max_acceleration: 0.75
  gripper_to_link4:
    has_position_limits: true
    min_position: -0.17453  # -10°
    max_position: 1.57080   # 90°
    has_velocity_limits: true
    max_velocity: 1.2
    has_acceleration_limits: true
    max_acceleration: 0.75
  gripper_left_joint:
    has_position_limits: true
    min_position: -0.01
    max_position: 0.019
    has_velocity_limits: true
    max_velocity: 0.5
    has_acceleration_limits: true
    max_acceleration: 0.5
