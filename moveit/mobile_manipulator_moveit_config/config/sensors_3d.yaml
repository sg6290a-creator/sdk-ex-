# ============================================================================
# Octomap sensor configuration for MoveIt2
# ============================================================================
# RealSense D405 PointCloud를 사용한 장애물 감지
#
# 토픽: /camera/camera/depth/color/points (PointCloud2)
# 
# DISABLED - 존재하지 않는 토픽으로 설정하여 비활성화
# ============================================================================

sensors:
  - sensor_plugin: occupancy_map_monitor/PointCloudOctomapUpdater
    point_cloud_topic: /disabled_octomap_topic  # 존재하지 않는 토픽
    max_range: 1.5
    point_subsample: 1
    padding_offset: 0.01
    padding_scale: 1.0
    max_update_rate: 10.0
    filtered_cloud_topic: /filtered_cloud
